<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signed Out — Active Aging Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --forest: #2d4a32; --sage: #7a9e7e; --sage-light: #b8d4bb;
  --cream: #f8f4ed; --warm: #fdf9f3; --clay: #c4845a;
  --charcoal: #1e2820; --mid: #607060;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--forest);
  color: #fff;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}

/* Background */
body::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 25% 35%, rgba(122,158,126,0.2) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 75%, rgba(201,168,76,0.06) 0%, transparent 50%);
}
.dot-grid { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 32px 32px; }

/* Floating leaves */
.leaf { position: absolute; opacity: 0.07; animation: drift linear infinite; }
.leaf:nth-child(1) { top: 12%; left: 7%;  font-size: 22px; animation-duration: 20s; }
.leaf:nth-child(2) { top: 65%; left: 4%;  font-size: 30px; animation-duration: 24s; animation-delay: -7s; }
.leaf:nth-child(3) { top: 18%; right: 7%; font-size: 18px; animation-duration: 17s; animation-delay: -4s; }
.leaf:nth-child(4) { top: 78%; right: 5%; font-size: 24px; animation-duration: 22s; animation-delay: -11s; }
@keyframes drift { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-18px) rotate(12deg); } }

/* Card */
.card {
  position: relative; z-index: 10;
  text-align: center;
  max-width: 460px;
  padding: 20px;
  opacity: 0;
  animation: fadeUp 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: none; } }

/* Logo */
.logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 48px; }
.logo-leaf { width: 38px; height: 38px; background: rgba(255,255,255,0.15); border-radius: 50% 50% 50% 10%; transform: rotate(-30deg); display: flex; align-items: center; justify-content: center; font-size: 17px; }
.logo-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.9); }

/* Icon */
.goodbye-icon {
  font-size: 72px;
  display: block;
  margin-bottom: 28px;
  animation: wave 1.5s ease-in-out 0.5s 2;
  transform-origin: bottom right;
}
@keyframes wave {
  0%,100% { transform: rotate(0deg); }
  20%      { transform: rotate(-15deg); }
  40%      { transform: rotate(12deg); }
  60%      { transform: rotate(-8deg); }
  80%      { transform: rotate(5deg); }
}

.card-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 6vw, 52px); font-weight: 600; line-height: 1.1; margin-bottom: 16px; }
.card-title em { font-style: italic; color: var(--sage-light); }
.card-sub { font-size: 16px; line-height: 1.75; color: rgba(255,255,255,0.55); margin-bottom: 44px; }

/* Buttons */
.btn-row { display: flex; flex-direction: column; gap: 12px; align-items: center; }
.btn { font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 600; padding: 14px 36px; border-radius: 50px; border: none; cursor: pointer; letter-spacing: 0.03em; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.25s; min-width: 220px; justify-content: center; }
.btn-light { background: #fff; color: var(--forest); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.btn-light:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.25); }
.btn-ghost { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2); }
.btn-ghost:hover { background: rgba(255,255,255,0.15); color: #fff; transform: translateY(-1px); }

/* Countdown */
.countdown { margin-top: 32px; font-size: 13px; color: rgba(255,255,255,0.3); }
.countdown span { color: rgba(255,255,255,0.5); font-weight: 600; }

/* Divider */
.divider { display: flex; align-items: center; gap: 12px; margin: 4px 0; width: 100%; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.12); }
.divider-text { font-size: 12px; color: rgba(255,255,255,0.3); white-space: nowrap; }
</style>
</head>
<body>

<div class="dot-grid"></div>
<span class="leaf">🌿</span>
<span class="leaf">🌱</span>
<span class="leaf">🍃</span>
<span class="leaf">🌿</span>

<div class="card">
  <div class="logo">
    <div class="logo-leaf">🌿</div>
    <div class="logo-text">Active Aging Partners</div>
  </div>

  <span class="goodbye-icon">👋</span>

  <h1 class="card-title">See you <em>soon</em></h1>
  <p class="card-sub">You've been signed out safely. Thank you for trusting Active Aging Partners to care for your loved one.</p>

  <div class="btn-row">
    <a href="index.html" class="btn btn-light">Sign back in →</a>
    <div class="divider"><span class="divider-text">or</span></div>
    <a href="index.html" class="btn btn-ghost">Back to homepage</a>
  </div>

  <div class="countdown">Redirecting to home in <span id="timer">10</span> seconds</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuXMMnVjij0x1X5sQ5Jm1NuJUvquwDb0k",
    authDomain: "active-aging-partners.firebaseapp.com",
    projectId: "active-aging-partners",
    storageBucket: "active-aging-partners.firebasestorage.app",
    messagingSenderId: "239822066888",
    appId: "1:239822066888:web:8599d14fce0388d510c1fd"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Complete sign out when this page loads
  signOut(auth).catch(() => {});
</script>

<script>
  // Countdown redirect
  let secs = 10;
  const timer = document.getElementById('timer');
  const interval = setInterval(() => {
    secs--;
    timer.textContent = secs;
    if (secs <= 0) {
      clearInterval(interval);
      window.location.href = 'index.html';
    }
  }, 1000);
</script>
</body>
</html>
